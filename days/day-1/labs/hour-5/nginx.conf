worker_processes 1;

events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout;
    error_log /dev/stderr notice;

    server {
        listen 80 default_server;
        server_name _;

        add_header X-Selected-Server default always;
        default_type text/plain;
        return 200 "selected server: default\n";
    }

    server {
        listen 80;
        server_name a.local.test;

        add_header X-Selected-Server site-a always;
        default_type text/plain;
        return 200 "selected server: site-a\n";
    }

    server {
        listen 80;
        server_name b.local.test;

        add_header X-Selected-Server site-b always;
        default_type text/plain;
        return 200 "selected server: site-b\n";
    }
}
