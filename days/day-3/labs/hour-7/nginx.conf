worker_processes 1;

events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=1s ipv6=off;
    resolver_timeout 1s;

    proxy_connect_timeout 1s;
    proxy_send_timeout 1s;
    proxy_read_timeout 1s;

    upstream retry_get_pool {
        server host.docker.internal:65534;
        server host.docker.internal:9032;
    }

    upstream payment_pool {
        server host.docker.internal:9031 max_fails=0;
        server host.docker.internal:9032 backup;
    }

    server {
        listen 80 default_server;

        location = /connect-refused {
            proxy_pass http://host.docker.internal:65534/;
        }

        location = /read-timeout {
            proxy_pass http://host.docker.internal:9031/slow;
        }

        location = /upstream-500 {
            proxy_pass http://host.docker.internal:9031/error;
        }

        location = /dns-failure {
            set $bad_upstream "http://does-not-exist.invalid";
            proxy_pass $bad_upstream;
        }

        location = /retry-get {
            proxy_next_upstream error timeout;
            proxy_pass http://retry_get_pool/ok;
        }

        location = /payments {
            proxy_next_upstream error timeout;
            proxy_pass http://payment_pool/payments;
        }

        location = /stats-a {
            proxy_pass http://host.docker.internal:9031/stats;
        }

        location = /stats-b {
            proxy_pass http://host.docker.internal:9032/stats;
        }
    }
}
