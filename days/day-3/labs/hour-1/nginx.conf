worker_processes 1;

events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout;
    error_log /dev/stderr notice;

    server {
        listen 8080;
        server_name backend;

        add_header X-Upstream-URI $request_uri always;
        default_type text/plain;
        return 200 "upstream uri: $request_uri\n";
    }

    server {
        listen 80 default_server;
        server_name _;

        location /preserve/ {
            proxy_pass http://127.0.0.1:8080;
        }

        location /strip/ {
            proxy_pass http://127.0.0.1:8080/;
        }

        location /service/ {
            proxy_pass http://127.0.0.1:8080/v1/;
        }

        location /joined/ {
            proxy_pass http://127.0.0.1:8080/v1;
        }

        location /rewrite/ {
            rewrite ^/rewrite/(.*)$ /v2/$1 break;
            proxy_pass http://127.0.0.1:8080;
        }

        location ~ ^/regex/(.*)$ {
            proxy_pass http://127.0.0.1:8080;
        }

        location /named/ {
            try_files /definitely-missing @backend_fallback;
        }

        location @backend_fallback {
            proxy_pass http://127.0.0.1:8080;
        }
    }
}
