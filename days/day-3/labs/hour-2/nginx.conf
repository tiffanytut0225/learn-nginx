worker_processes 1;

events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout;
    error_log /dev/stderr notice;

    server {
        listen 8080;
        server_name backend;

        add_header X-Seen-Host $http_host always;
        add_header X-Seen-XFF $http_x_forwarded_for always;
        add_header X-Seen-Real-IP $http_x_real_ip always;
        add_header X-Seen-Proto $http_x_forwarded_proto always;
        default_type text/plain;
        return 200 "backend received proxy headers\n";
    }

    server {
        listen 80 default_server;
        server_name _;

        add_header X-Front-Remote $remote_addr always;

        location /default/ {
            proxy_pass http://127.0.0.1:8080;
        }

        location /append/ {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://127.0.0.1:8080;
        }

        location /edge/ {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://127.0.0.1:8080;
        }
    }
}
