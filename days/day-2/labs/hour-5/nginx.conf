worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    access_log /dev/stdout;
    error_log /dev/stderr notice;

    server {
        listen 80 default_server;
        server_name unsafe.local.test;
        root /usr/share/nginx/html;

        location = /index.html {
            add_header X-Location exact-index always;
        }

        location / {
            add_header X-Location unsafe-spa-fallback always;
            try_files $uri $uri/ /index.html;
        }
    }

    server {
        listen 80;
        server_name safe.local.test;
        root /usr/share/nginx/html;

        location = /index.html {
            add_header X-Location exact-index always;
        }

        location ^~ /assets/ {
            add_header X-Location safe-assets always;
            try_files $uri =404;
        }

        location ^~ /api/ {
            add_header X-Location safe-api always;
            default_type text/plain;
            return 404 "API route unavailable\n";
        }

        location / {
            add_header X-Location safe-spa-fallback always;
            try_files $uri $uri/ /index.html;
        }
    }
}
