worker_processes 1;

events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout;
    error_log /dev/stderr notice;

    server {
        listen 80 default_server;
        server_name _;
        root /usr/share/nginx/html;
        default_type text/plain;

        location = /old {
            return 301 /new;
        }

        location = /legacy {
            rewrite ^ /new last;
        }

        location = /new {
            add_header X-Location exact-new always;
            return 200 "new content\n";
        }

        location /files/ {
            add_header X-Location try-files always;
            try_files $uri @fallback;
        }

        location @fallback {
            add_header X-Location named-fallback always;
            return 404 "named fallback\n";
        }

        location = /missing-preserve {
            error_page 404 /404-preserve.html;
            return 404;
        }

        location = /404-preserve.html {
            add_header X-Location error-preserve always;
        }

        location = /missing-convert {
            error_page 404 = /converted;
            return 404;
        }

        location = /converted {
            add_header X-Location error-convert always;
            return 200 "converted to 200\n";
        }
    }
}
