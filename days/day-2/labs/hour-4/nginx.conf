worker_processes 1;

events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout;
    error_log /dev/stderr notice;

    server {
        listen 80 default_server;
        server_name _;

        location /root-images/ {
            root /srv/site;
            add_header X-File-Path $request_filename always;
        }

        location /alias-images/ {
            alias /srv/site/;
            add_header X-File-Path $request_filename always;
        }

        location /root-downloads/ {
            root /data;
            add_header X-File-Path $request_filename always;
        }

        location /alias-downloads/ {
            alias /data/;
            add_header X-File-Path $request_filename always;
        }

        location ~ ^/users/(.+\.(?:png|jpg))$ {
            alias /data/images/$1;
            add_header X-File-Path $request_filename always;
        }

        location ~ ^/exports/([^/]+)/(.+\.csv)$ {
            alias /archive/$1/$2;
            add_header X-File-Path $request_filename always;
        }
    }
}
