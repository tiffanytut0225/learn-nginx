worker_processes 1;

events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout;
    error_log /dev/stderr notice;

    server {
        listen 80 default_server;
        server_name _;

        root /usr/share/nginx/html;
        default_type text/plain;

        location = / {
            add_header X-Location exact-root always;
            return 200 "exact-root\n";
        }

        location / {
            add_header X-Location prefix-root always;
            return 200 "prefix-root\n";
        }

        location /api {
            add_header X-Location prefix-api always;
            return 200 "prefix-api\n";
        }

        location ^~ /assets/ {
            add_header X-Location preferred-assets always;
            return 200 "preferred-assets\n";
        }

        location ~ \.php$ {
            add_header X-Location regex-php always;
            return 200 "regex-php\n";
        }

        location ~* \.(png|jpg)$ {
            add_header X-Location regex-image always;
            return 200 "regex-image\n";
        }

        location /files/ {
            add_header X-Location prefix-files always;
            try_files $uri @missing;
        }

        location @missing {
            add_header X-Location named-missing always;
            return 404 "named-missing\n";
        }
    }
}
