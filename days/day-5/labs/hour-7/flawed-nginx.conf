worker_processes 1;

events {
    worker_connections 1024;
}

http {
    log_format risky '$remote_addr "$request" '
                     'status=$status '
                     'authorization="$http_authorization" '
                     'cookie="$http_cookie" '
                     'uri="$request_uri"';

    access_log /var/log/nginx/access.log risky;

    server {
        listen 80 default_server;
        server_name _;

        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl default_server;
        server_name faceid.example.com;

        ssl_certificate /etc/nginx/certs/leaf-only.crt;
        ssl_certificate_key /etc/nginx/certs/faceid.example.com.key;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        location /api/ {
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://backend/v1/;
        }

        location / {
            try_files $uri /index.html;
        }
    }
}
