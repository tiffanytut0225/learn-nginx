worker_processes 1;

events {
    worker_connections 1024;
}

http {
    server {
        listen 80 default_server;

        add_header X-Config-Version "v2" always;

        location = /version {
            return 200 "version=v2\n";
        }

        location = /health {
            return 200 "healthy\n";
        }
    }
}
