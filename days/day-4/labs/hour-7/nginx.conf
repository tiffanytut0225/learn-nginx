worker_processes 1;

events {
    worker_connections 1024;
}

http {
    limit_req_zone $binary_remote_addr zone=api_rate:10m rate=1r/s;
    limit_conn_zone $binary_remote_addr zone=per_ip_conn:10m;

    limit_req_status 429;
    limit_conn_status 429;

    server {
        listen 80 default_server;

        client_max_body_size 1k;
        client_body_timeout 2s;
        client_header_timeout 2s;

        location = /upload {
            return 200 "upload accepted\n";
        }

        location = /rate {
            limit_req zone=api_rate nodelay;
            proxy_pass http://host.docker.internal:9041/ok;
        }

        location = /hold {
            limit_conn per_ip_conn 1;
            proxy_pass http://host.docker.internal:9041/hold;
        }

        location = /health {
            return 200 "healthy\n";
        }
    }
}
