apiVersion: v1
kind: Namespace
metadata:
  name: nginx-timeout-lab
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: slow-backend-script
  namespace: nginx-timeout-lab
data:
  server.py: |
    import time
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer

    class Handler(BaseHTTPRequestHandler):
        def do_GET(self):
            time.sleep(3)
            body = b"hello from slow backend\n"
            self.send_response(200)
            self.send_header("Content-Type", "text/plain")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def log_message(self, format, *args):
            print(
                "%s - %s" % (self.address_string(), format % args),
                flush=True,
            )

    print("slow backend listening on 0.0.0.0:8080", flush=True)
    ThreadingHTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: slow-backend
  namespace: nginx-timeout-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: slow-backend
  template:
    metadata:
      labels:
        app: slow-backend
    spec:
      containers:
        - name: slow-backend
          image: python:3.13-alpine
          command:
            - python
            - -u
            - /app/server.py
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            tcpSocket:
              port: http
          volumeMounts:
            - name: script
              mountPath: /app/server.py
              subPath: server.py
              readOnly: true
      volumes:
        - name: script
          configMap:
            name: slow-backend-script
---
apiVersion: v1
kind: Service
metadata:
  name: slow-backend
  namespace: nginx-timeout-lab
spec:
  selector:
    app: slow-backend
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: timeout-nginx-config
  namespace: nginx-timeout-lab
data:
  default.conf: |
    upstream slow_backend {
        server slow-backend:8080;
    }

    log_format timeout_lab '$remote_addr "$request" status=$status '
                           'upstream=$upstream_addr upstream_status=$upstream_status '
                           'connect_time=$upstream_connect_time '
                           'header_time=$upstream_header_time '
                           'response_time=$upstream_response_time';

    server {
        listen 80;
        server_name timeout.local.test;

        access_log /var/log/nginx/access.log timeout_lab;

        location = /healthz {
            access_log off;
            return 200 "ok\n";
        }

        location /timeout/ {
            proxy_pass http://slow_backend/;
            proxy_connect_timeout 1s;
            proxy_read_timeout 1s;
        }

        location /success/ {
            proxy_pass http://slow_backend/;
            proxy_connect_timeout 1s;
            proxy_read_timeout 5s;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: timeout-nginx
  namespace: nginx-timeout-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: timeout-nginx
  template:
    metadata:
      labels:
        app: timeout-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:stable-alpine
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: timeout-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: timeout-nginx
  namespace: nginx-timeout-lab
spec:
  selector:
    app: timeout-nginx
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: timeout-nginx
  namespace: nginx-timeout-lab
spec:
  ingressClassName: traefik
  rules:
    - host: timeout.local.test
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: timeout-nginx
                port:
                  number: 80
